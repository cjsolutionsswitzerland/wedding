<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venues</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand couple-name" href="index.html"></a>
    <button id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-menu">
      <a class="nav-link" href="index.html"    data-page="info"     data-i18n="nav.info"></a>
      <a class="nav-link" href="venues.html"   data-page="venues"   data-i18n="nav.venues"></a>
      <a class="nav-link" href="wishlist.html" data-page="wishlist" data-i18n="nav.wishlist"></a>
      <a class="nav-link" href="register.html" data-page="rsvp"     data-i18n="nav.rsvp"></a>
    </div>
    <div class="nav-right">
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<section class="hero" style="padding: 3rem 1.5rem 2.5rem;">
  <div class="hero-content">
    <div class="hero-names couple-name"></div>
    <div class="hero-divider"></div>
    <p class="hero-tagline wedding-date"></p>
  </div>
</section>

<main class="container">
  <h2 class="section-title" data-i18n="venues.title"></h2>

  <!-- Tab buttons -->
  <div class="venue-tabs">
    <button class="venue-tab active" data-tab="ceremony">
      ⛪ <span data-i18n="venues.tab_ceremony"></span>
    </button>
    <button class="venue-tab" data-tab="party">
      🎉 <span data-i18n="venues.tab_party"></span>
    </button>
  </div>

  <!-- Ceremony tab -->
  <div class="venue-panel active" id="tab-ceremony">
    <div class="venue-header">
      <div>
        <h3 class="venue-name">Pontificio Ateneo Sant'Anselmo</h3>
        <p class="venue-address">📍 Piazza dei Cavalieri di Malta, 5 — 00153 Roma, Italia</p>
        <a class="venue-map-btn"
           href="https://maps.google.com/?q=Pontificio+Ateneo+Sant+Anselmo+Roma"
           target="_blank" rel="noopener">
          🗺 Google Maps
        </a>
      </div>
      <p class="venue-desc" data-i18n="venues.ceremony_desc"></p>
    </div>

    <div class="venue-gallery">
      <div class="gallery-main">
        <img src="assets/anselmo_building.jpg" alt="Sant'Anselmo aerial view" class="gallery-active" id="ceremony-main" />
      </div>
      <div class="gallery-thumbs">
        <img src="assets/anselmo_building.jpg"
             alt="Aerial view" class="thumb active"
             onclick="setMain('ceremony-main', this)" />
        <img src="assets/anselmo_entrance.jpg"
             alt="Entrance" class="thumb"
             onclick="setMain('ceremony-main', this)" />
        <img src="assets/anselmo_cloister.jpg"
             alt="Cloister" class="thumb"
             onclick="setMain('ceremony-main', this)" />
        <img src="assets/anselmo_loggia.jpg"
             alt="Loggia" class="thumb"
             onclick="setMain('ceremony-main', this)" />
      </div>
    </div>
  </div>

  <!-- Party tab -->
  <div class="venue-panel" id="tab-party">
    <div class="venue-header">
      <div>
        <h3 class="venue-name">Villa Demetra</h3>
        <p class="venue-address">📍 Via Ardeatina 1330A — 00134 Roma, Italia</p>
        <a class="venue-map-btn"
           href="https://maps.google.com/?q=Villa+Demetra+Via+Ardeatina+1330+Roma"
           target="_blank" rel="noopener">
          🗺 Google Maps
        </a>
      </div>
      <p class="venue-desc" data-i18n="venues.party_desc"></p>
    </div>

    <div class="venue-gallery">
      <div class="gallery-main">
        <img src="assets/villa_gate.jpg" alt="Villa Demetra entrance" class="gallery-active" id="party-main" />
      </div>
      <div class="gallery-thumbs">
        <img src="assets/villa_gate.jpg"
             alt="Entrance gate" class="thumb active"
             onclick="setMain('party-main', this)" />
        <img src="assets/villa_exterior.jpg"
             alt="Villa and gardens" class="thumb"
             onclick="setMain('party-main', this)" />
      </div>
    </div>
  </div>
</main>

<footer>
  <p>Made with ❤️ for <span class="couple-name"></span></p>
</footer>

<script src="js/translations.js"></script>
<script src="js/app.js"></script>
<script>
  // Tab switching
  document.querySelectorAll(".venue-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".venue-tab").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".venue-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    });
  });

  // Gallery thumbnail click
  function setMain(mainId, thumb) {
    const main = document.getElementById(mainId);
    main.src = thumb.src;
    main.alt = thumb.alt;
    thumb.closest(".venue-gallery").querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
    thumb.classList.add("active");
  }
</script>
</body>
</html>
