<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-brand couple-name"></span>
    <button id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-menu">
      <a class="nav-link" href="index.html"    data-page="info"     data-i18n="nav.info"></a>
      <a class="nav-link" href="wishlist.html" data-page="wishlist" data-i18n="nav.wishlist"></a>
      <a class="nav-link" href="register.html" data-page="rsvp"     data-i18n="nav.rsvp"></a>
    </div>
    <div class="nav-right">
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <div class="hero-names couple-name"></div>
    <div class="hero-divider"></div>
    <p class="hero-tagline" data-i18n="hero.tagline"></p>
    <p class="hero-date wedding-date" style="margin-top:.8rem"></p>
  </div>
</section>

<main class="container">
  <h2 class="section-title" data-i18n="info.title"></h2>

  <div class="cards-grid">
    <div class="card">
      <div class="card-icon">📅</div>
      <h3 data-i18n="info.date_heading"></h3>
      <p class="wedding-date"></p>
    </div>
    <div class="card">
      <div class="card-icon">📍</div>
      <h3 data-i18n="info.location_heading"></h3>
      <p class="wedding-location"></p>
    </div>
    <div class="card">
      <div class="card-icon">🕐</div>
      <h3 data-i18n="info.schedule_heading"></h3>
      <p data-i18n="info.schedule_value"></p>
    </div>
    <div class="card">
      <div class="card-icon">👗</div>
      <h3 data-i18n="info.dress_heading"></h3>
      <p data-i18n="info.dress_value"></p>
    </div>
  </div>
</main>

<footer>
  <p>Made with ❤️ for <span class="couple-name"></span></p>
</footer>

<script src="js/translations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
