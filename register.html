<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand couple-name" href="index.html"></a>
    <button id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-menu">
      <a class="nav-link" href="index.html"    data-page="info"     data-i18n="nav.info"></a>
      <a class="nav-link" href="wishlist.html" data-page="wishlist" data-i18n="nav.wishlist"></a>
      <a class="nav-link" href="register.html" data-page="rsvp"     data-i18n="nav.rsvp"></a>
    </div>
    <div class="nav-right">
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</nav>

<section class="hero" style="padding: 3rem 1.5rem 2.5rem;">
  <div class="hero-content">
    <div class="hero-names couple-name"></div>
  </div>
</section>

<main class="container">
  <div class="rsvp-wrap">
    <h2 class="section-title" data-i18n="register.title"></h2>

    <div class="deadline-banner">
      <span data-i18n="register.deadline_label"></span>:
      <strong id="deadline-info"></strong>
    </div>

    <div id="msg-box" class="msg-box"></div>

    <div id="form-wrap" class="form-card">
      <form id="rsvp-form" novalidate>

        <!-- Name search -->
        <div class="form-group">
          <label for="name-input" data-i18n="register.select_label"></label>
          <div class="name-search-wrap">
            <input type="text" id="name-input" class="name-search-input"
              autocomplete="off" spellcheck="false"
              data-i18n-placeholder="register.search_placeholder" />
            <input type="hidden" id="name-value" name="name" />
            <div id="name-dropdown" class="name-dropdown"></div>
          </div>
        </div>

        <!-- Travel -->
        <div class="form-group">
          <label data-i18n="register.travel_label"></label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="travel-train" name="travel" value="train" />
              <label for="travel-train" data-i18n="register.travel_train"></label>
            </div>
            <div class="radio-option">
              <input type="radio" id="travel-car" name="travel" value="car" />
              <label for="travel-car" data-i18n="register.travel_car"></label>
            </div>
          </div>
        </div>

        <!-- Food -->
        <div class="form-group">
          <label data-i18n="register.food_label"></label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="food-all" name="food" value="all" />
              <label for="food-all" data-i18n="register.food_all"></label>
            </div>
            <div class="radio-option">
              <input type="radio" id="food-veg" name="food" value="vegetarian" />
              <label for="food-veg" data-i18n="register.food_veg"></label>
            </div>
          </div>
        </div>

        <!-- Allergies -->
        <div class="form-group">
          <label for="allergies" data-i18n="register.allergy_label"></label>
          <textarea id="allergies" name="allergies"
            data-i18n-placeholder="register.allergy_placeholder"></textarea>
        </div>

        <!-- Hotel -->
        <div class="form-group">
          <label data-i18n="register.hotel_label"></label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="hotel-need" name="hotel" value="need" />
              <label for="hotel-need" data-i18n="register.hotel_need"></label>
            </div>
            <div class="radio-option">
              <input type="radio" id="hotel-have" name="hotel" value="have" />
              <label for="hotel-have" data-i18n="register.hotel_have"></label>
            </div>
            <div class="radio-option">
              <input type="radio" id="hotel-none" name="hotel" value="none" />
              <label for="hotel-none" data-i18n="register.hotel_none"></label>
            </div>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit" data-i18n="register.submit"></button>
      </form>
    </div>
  </div>
</main>

<footer>
  <p>Made with ❤️ for <span class="couple-name"></span></p>
</footer>

<script src="js/translations.js"></script>
<script src="js/app.js"></script>
<script src="js/register.js"></script>
</body>
</html>
